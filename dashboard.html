<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Portal IT</title>
  <link rel="stylesheet" href="estudio.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding: 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .user-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
      font-weight: 600;
    }

    .user-details h2 {
      margin: 0;
      font-size: 18px;
      color: #333;
    }

    .user-details p {
      margin: 2px 0 0 0;
      font-size: 12px;
      color: #999;
    }

    .btn-logout {
      background: #ff6b6b;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn-logout:hover {
      background: #ee5a52;
      transform: translateY(-2px);
    }

    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .chart-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .chart-card h3 {
      margin: 0 0 20px 0;
      color: #333;
      font-size: 16px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      border-left: 4px solid #667eea;
    }

    .stat-card h4 {
      margin: 0;
      color: #999;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-card .value {
      margin: 10px 0 0 0;
      font-size: 32px;
      font-weight: bold;
      color: #667eea;
    }

    .stat-card.progress {
      border-left-color: #4caf50;
    }

    .stat-card.progress .value {
      color: #4caf50;
    }

    .stat-card.time {
      border-left-color: #ff9800;
    }

    .stat-card.time .value {
      color: #ff9800;
    }

    .stat-card.areas {
      border-left-color: #2196f3;
    }

    .stat-card.areas .value {
      color: #2196f3;
    }

    .areas-table {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      overflow-x: auto;
    }

    .areas-table h3 {
      margin: 0 0 20px 0;
      color: #333;
      font-size: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: #f5f5f5;
      padding: 12px;
      text-align: left;
      font-weight: 600;
      color: #666;
      font-size: 13px;
      border-bottom: 2px solid #e0e0e0;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #e0e0e0;
      font-size: 13px;
      color: #666;
    }

    tr:hover {
      background: #f9f9f9;
    }

    .progress-bar {
      background: #e0e0e0;
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      transition: width 0.3s;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
      font-size: 14px;
    }

    .spinner-small {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Header del Dashboard -->
  <div class="dashboard-header">
    <div class="user-info">
      <div class="user-avatar" id="userAvatar">👨</div>
      <div class="user-details">
        <h2 id="userName">Usuario</h2>
        <p id="userEmail">email@example.com</p>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()">🚪 Cerrar Sesión</button>
  </div>

  <!-- Estadísticas Principales -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card">
      <h4>Ejercicios Completados</h4>
      <div class="value" id="ejerciciosCompletados">-</div>
    </div>
    <div class="stat-card progress">
      <h4>Progreso General</h4>
      <div class="value" id="porcentajeProgreso">-%</div>
    </div>
    <div class="stat-card time">
      <h4>Tiempo Total</h4>
      <div class="value" id="tiempoTotal">-</div>
    </div>
    <div class="stat-card areas">
      <h4>Áreas Completadas</h4>
      <div class="value" id="areasCompletadas">-</div>
    </div>
  </div>

  <!-- Gráficos -->
  <div class="charts-grid">
    <div class="chart-card">
      <h3>📊 Progreso por Área</h3>
      <canvas id="progressByArea"></canvas>
    </div>
    <div class="chart-card">
      <h3>📈 Ejercicios por Dificultad</h3>
      <canvas id="difficultyChart"></canvas>
    </div>
    <div class="chart-card">
      <h3>⏱️ Tiempo Dedicado</h3>
      <canvas id="timeChart"></canvas>
    </div>
  </div>

  <!-- Tabla de Estadísticas por Área -->
  <div class="areas-table">
    <h3>📋 Detalle por Área</h3>
    <table id="areasDetailTable">
      <thead>
        <tr>
          <th>Área</th>
          <th>Ejercicios</th>
          <th>Completados</th>
          <th>Progreso</th>
          <th>Tiempo (min)</th>
          <th>Promedio Intentos</th>
        </tr>
      </thead>
      <tbody id="areasTableBody">
        <tr>
          <td colspan="6" class="loading">
            <div class="spinner-small"></div> Cargando datos...
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <script src="api-helper.js"></script>
  <script src="ejercicios.js"></script>
  <script>
    let usuarioDatos = null;
    let chartInstances = {};

    window.addEventListener('load', async () => {
      // Verificar autenticación
      if (!APIHelper.getToken()) {
        window.location.href = '/';
        return;
      }

      // Cargar datos del usuario
      await cargarDatos();
      
      // Sincronizar con backend
      await sincronizarProgreso();
      await sincronizarLogros();
    });

    async function cargarDatos() {
      const perfil = await APIHelper.obtenerPerfil();
      
      if (!perfil) {
        APIHelper.logout();
        return;
      }

      const usuario = APIHelper.getUsuario();
      usuarioDatos = perfil;

      // Actualizar header
      document.getElementById('userName').textContent = usuario.username;
      document.getElementById('userEmail').textContent = usuario.email;
      document.getElementById('userAvatar').textContent = usuario.username.charAt(0).toUpperCase();

      // Cargar progreso
      const progreso = await APIHelper.obtenerProgreso() || [];
      const estadisticas = await APIHelper.obtenerEstadisticas() || [];

      // Actualizar estadísticas
      actualizarEstadisticas(progreso, estadisticas);

      // Generar gráficos
      generarGraficos(progreso, estadisticas);
    }

    function actualizarEstadisticas(progreso, estadisticas) {
      const completados = progreso.filter(p => p.completado).length;
      const total = progreso.length;
      const porcentaje = total > 0 ? Math.round((completados / total) * 100) : 0;

      document.getElementById('ejerciciosCompletados').textContent = completados;
      document.getElementById('porcentajeProgreso').textContent = porcentaje + '%';

      // Tiempo total
      const tiempoTotal = progreso.reduce((sum, p) => sum + (p.tiempo_dedicado || 0), 0);
      document.getElementById('tiempoTotal').textContent = Math.round(tiempoTotal / 60) + ' hrs';

      // Áreas completadas
      const areasSet = new Set(estadisticas.map(e => e.area));
      document.getElementById('areasCompletadas').textContent = areasSet.size;

      // Llenar tabla
      llenarTablaAreas(estadisticas, progreso);
    }

    function llenarTablaAreas(estadisticas, progreso) {
      const tbody = document.getElementById('areasTableBody');
      
      if (estadisticas.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #999;">No hay datos aún. ¡Completa algunos ejercicios!</td></tr>';
        return;
      }

      tbody.innerHTML = estadisticas.map(stats => {
        const porcentaje = stats.ejercicios_completados > 0 
          ? Math.round((stats.ejercicios_completados / stats.ejercicios_completados) * 100)
          : 0;

        return `
          <tr>
            <td><strong>${stats.area}</strong></td>
            <td>${stats.ejercicios_completados}</td>
            <td>${stats.ejercicios_completados}</td>
            <td>
              <div class="progress-bar">
                <div class="progress-fill" style="width: ${porcentaje}%"></div>
              </div>
              <small>${porcentaje}%</small>
            </td>
            <td>${Math.round(stats.tiempo_total / 60) || 0}</td>
            <td>${stats.promedio_intentos.toFixed(1)}</td>
          </tr>
        `;
      }).join('');
    }

    function generarGraficos(progreso, estadisticas) {
      // Contar por área
      const areasCount = {};
      const areasDificultad = { facil: 0, intermedio: 0, dificil: 0 };

      progreso.forEach(p => {
        const area = p.ejercicio_id.split('-')[0];
        const nivel = p.ejercicio_id.split('-')[1];
        
        areasCount[area] = (areasCount[area] || 0) + (p.completado ? 1 : 0);
        
        if (p.completado) {
          if (nivel === 'facil') areasDificultad.facil++;
          else if (nivel === 'intermedio') areasDificultad.intermedio++;
          else if (nivel === 'dificil') areasDificultad.dificil++;
        }
      });

      // Gráfico 1: Progreso por Área
      const ctx1 = document.getElementById('progressByArea').getContext('2d');
      chartInstances.area = new Chart(ctx1, {
        type: 'bar',
        data: {
          labels: Object.keys(areasCount),
          datasets: [{
            label: 'Ejercicios Completados',
            data: Object.values(areasCount),
            backgroundColor: 'rgba(102, 126, 234, 0.6)',
            borderColor: 'rgb(102, 126, 234)',
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true } }
        }
      });

      // Gráfico 2: Dificultad
      const ctx2 = document.getElementById('difficultyChart').getContext('2d');
      chartInstances.difficulty = new Chart(ctx2, {
        type: 'doughnut',
        data: {
          labels: ['🟢 Fácil', '🟡 Intermedio', '🔴 Difícil'],
          datasets: [{
            data: [areasDificultad.facil, areasDificultad.intermedio, areasDificultad.dificil],
            backgroundColor: ['#4caf50', '#ff9800', '#f44336'],
            borderColor: '#fff',
            borderWidth: 2
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { position: 'bottom' } }
        }
      });

      // Gráfico 3: Tiempo
      const ctx3 = document.getElementById('timeChart').getContext('2d');
      const tiempoArea = {};
      estadisticas.forEach(s => {
        tiempoArea[s.area] = s.tiempo_total;
      });

      chartInstances.time = new Chart(ctx3, {
        type: 'line',
        data: {
          labels: Object.keys(tiempoArea).slice(0, 7),
          datasets: [{
            label: 'Minutos',
            data: Object.values(tiempoArea).slice(0, 7),
            borderColor: 'rgb(102, 126, 234)',
            backgroundColor: 'rgba(102, 126, 234, 0.1)',
            borderWidth: 2,
            fill: true,
            tension: 0.4
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true } }
        }
      });
    }

    function logout() {
      if (confirm('¿Estás seguro de que deseas cerrar sesión?')) {
        APIHelper.logout();
      }
    }
  </script>
</body>
</html>
