<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Examen Python</title>
<link rel="stylesheet" href="estudio.css">

</head>

<body>

<div class="content">

<h1>Examen Python</h1>

<div class="card">
<p>¿Qué comando imprime en pantalla?</p>
<button onclick="check('print','print','r1')">print()</button>
<button onclick="check('echo','print','r1')">echo</button>
<p id="r1"></p>
</div>

<div class="card">
<p>¿Cuál es el tipo de 3.14?</p>
<button onclick="check('float','float','r2')">float</button>
<button onclick="check('int','float','r2')">int</button>
<p id="r2"></p>
</div>

<div class="card">
<p>¿Qué crea un bucle definido?</p>
<button onclick="check('for','for','r3')">for</button>
<button onclick="check('while','for','r3')">while</button>
<p id="r3"></p>
</div>

<div class="card">
<p>¿Cómo defines una función?</p>
<button onclick="check('def','def','r4')">def nombre():</button>
<button onclick="check('function','def','r4')">function nombre()</button>
<p id="r4"></p>
</div>

<div class="card">
<p>¿Qué almacena múltiples valores?</p>
<button onclick="check('lista','lista','r5')">Lista</button>
<button onclick="check('numero','lista','r5')">Número</button>
<p id="r5"></p>
</div>

</div>

</body>
</html>
